<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Splash White Water Rafting to plan your next adventure, ask questions, or get help booking your trip.">
    <meta name="author" content="Oludayo Oluboyede">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | Splash White Water Rafting</title>
</head>

<body>
    <header>
        <img src="images/splash-logo.png" alt="Splash white water rafting logo">

        <div></div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>    
        <section class="company-info">
            <h1>Splash White Water Rafting </h1>

            <p>154 Wonka Niagara Street</p>
            <p>Futon, Ohio</p>
            <p>+1 467 121 9999</p>
            <p>info@splashwhitewater.com</p>

        </section>

        <section class="contact-grid">
    
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d49432260.239595994!2d-147.51560289999998!3d40.86955390000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c5b2053f4c26ab%3A0x59bebc6dc172141b!2sWhitewater%20Rafting%20Adventures!5e0!3m2!1sen!2sng!4v1775144358199!5m2!1sen!2sng" width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                
            </div>

            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter Your Name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter Your Email" required>

                <p class="form-label">Message Purpose</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation" required>
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion" required>
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Type here..."></textarea>

                <label class="checkbox">
                    <input type="checkbox" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit" class="submit-btn">Get in Touch!</button>

            </form>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/team4.webp" alt="Picture of a Team Member">

                    <figcaption>Sarah Johnson | Reservation Manager</figcaption>
                </figure>

                 <figure>
                    <img src="images/team2.webp" alt="Picture of a Team Member">

                    <figcaption>Tiffany Jones | Safety Instructor</figcaption>
                </figure>

                 <figure>
                    <img src="images/team5.webp" alt="Picture of a Team Member">

                    <figcaption>Vikram Sandeep | Lead River Guide</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>
            &copy; 🚣🏽 2026 🚣🏽 Splash White Water Rafting 🚣🏽 Oludayo Oluboyede
        </p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
